<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>CSSLP Flashcards</title>
    <link rel='manifest' href='manifest.json'>
    <link rel='stylesheet' href='style.css'>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CSSLP Flash">
    <link rel="apple-touch-icon" href="icon.png"> 
</head>
<body>
    <div id='topbar'>
        <button id='modeBtn'>☀/☾</button>
        <button id='shuffleBtn' class="toggle-btn"></button>
        <button id='resetBtn'>Reset Card</button>
        <button id='exportBtn'>Export</button>
        <button id='importBtn'>Import</button>
        <button id='clearAllBtn' style="color: #ff4d4d;">Clear All</button>
        <input type="file" id="fileInput" style="display:none" accept=".json">
        
        <div class="nav-row">
            <button id='prevBtn'>&lt; Prev</button>
            <button id='nextBtn'>Next &gt;</button>
        </div>
    </div>

    <div class="card-container">
        <div id="count-red" class="counter counter-red">0</div>
        <div id="count-green" class="counter counter-green">0</div>
        
        <div id='card' class='card'>
            <div id='card-front' class='face front'></div>
            <div id='card-back' class='face back'></div>
        </div>
    </div>

    <div id="stats-container">
        <div class="progress-bg"><div id="progress-bar"></div></div>
        <div id="stats-text">Mastery: 0%</div>
    </div>

    <script src='app.js'></script>
</body>
</html>
